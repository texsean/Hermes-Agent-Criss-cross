; PlatformIO Project Configuration — ESP32-S3 Camera Node
; Inventory Buddy — Shelf Camera Firmware

[env:esp32-s3-cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Libraries
lib_deps =
    ; ESP-NOW and WiFi built into arduino-esp32
    ; Camera driver
    esphome/ESP32-CAM@^1.0.0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
    -DCAMERA_MODEL_AI_THINKER

; Partition scheme: maximize app space
board_build.partitions = default_8MB.csv
board_build.flash_mode = qio
board_upload.flash_size = 8MB
